workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Patch swift-transformers version
        script: |
          # Заменяем старый диапазон версии на совместимый с mlx-swift-examples
          sed -i '' \
            's/"swift-transformers" : "0\.1\.17\.\.< *1\.0\.0"/"swift-transformers" : "1.1.0"..<"1.2.0"/g' \
            fullmoon.xcodeproj/project.pbxproj
          
          # На случай другого формата записи в pbxproj
          sed -i '' \
            's/upToNextMajorVersion.*swift-transformers.*0\.1/upToNextMinorVersion from: "1.1.0"/g' \
            fullmoon.xcodeproj/project.pbxproj
          
          find . -name "Package.resolved" -delete
      - name: Resolve Swift packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project fullmoon.xcodeproj \
            -scheme fullmoon
      - name: Build unsigned IPA
        script: |
          xcodebuild archive \
            -project fullmoon.xcodeproj \
            -scheme fullmoon \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$CM_BUILD_DIR/fullmoon.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
          
          mkdir -p Payload
          cp -r "$CM_BUILD_DIR/fullmoon.xcarchive/Products/Applications/fullmoon.app" Payload/
          zip -r fullmoon.ipa Payload
    artifacts:
      - fullmoon.ipa
