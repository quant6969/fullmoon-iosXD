workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Resolve Swift packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project fullmoon.xcodeproj \
            -scheme fullmoon
      - name: Build unsigned IPA
        script: |
          xcodebuild archive \
            -project fullmoon.xcodeproj \
            -scheme fullmoon \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$CM_BUILD_DIR/fullmoon.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
          
          mkdir -p Payload
          cp -r "$CM_BUILD_DIR/fullmoon.xcarchive/Products/Applications/fullmoon.app" Payload/
          zip -r fullmoon.ipa Payload
    artifacts:
      - fullmoon.ipa
