workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Patch Swift dependencies
        script: |
          # 1. Исправляем версию swift-transformers (ты уже знаешь зачем это)
          sed -i '' 's/minimumVersion = 0.1.17;/minimumVersion = 1.1.0;/g' fullmoon.xcodeproj/project.pbxproj
          
          # 2. Меняем ссылку на переехавший репозиторий библиотек MLX
          sed -i '' 's|https://github.com/ml-explore/mlx-swift-examples/|https://github.com/ml-explore/mlx-swift-lm|g' fullmoon.xcodeproj/project.pbxproj
          
          # Очищаем кэш зависимостей
          find . -name "Package.resolved" -delete
          
      - name: Resolve Swift packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project fullmoon.xcodeproj \
            -scheme fullmoon
            
      - name: Build unsigned IPA
        script: |
          # Собираем приложение без подписи
          xcodebuild build \
            -project fullmoon.xcodeproj \
            -scheme fullmoon \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CONFIGURATION_BUILD_DIR="$CM_BUILD_DIR/build"
          
          # Упаковываем результат в IPA
          mkdir -p Payload
          cp -r "$CM_BUILD_DIR/build/fullmoon.app" Payload/
          zip -r fullmoon.ipa Payload
          
    artifacts:
      - fullmoon.ipa
