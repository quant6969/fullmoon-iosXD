workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Patch swift-transformers version
        script: |
          # Находим строку с конкретной старой версией и меняем на нужную для MLX
          sed -i '' 's/minimumVersion = 0.1.17;/minimumVersion = 1.1.0;/g' fullmoon.xcodeproj/project.pbxproj
          
          # Удаляем кэш разрешенных зависимостей, чтобы SPM скачал их заново с новыми правилами
          find . -name "Package.resolved" -delete
      - name: Resolve Swift packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project fullmoon.xcodeproj \
            -scheme fullmoon
      - name: Build unsigned IPA
        script: |
          xcodebuild archive \
            -project fullmoon.xcodeproj \
            -scheme fullmoon \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$CM_BUILD_DIR/fullmoon.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
          
          mkdir -p Payload
          cp -r "$CM_BUILD_DIR/fullmoon.xcarchive/Products/Applications/fullmoon.app" Payload/
          zip -r fullmoon.ipa Payload
    artifacts:
      - fullmoon.ipa
