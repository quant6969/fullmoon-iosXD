workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Patch Swift dependencies
        script: |
          set -e # Останавливаем скрипт при любой ошибке
          
          # 1. Исправляем версию swift-transformers
          sed -i '' 's/minimumVersion = 0.1.17;/minimumVersion = 1.1.0;/g' fullmoon.xcodeproj/project.pbxproj
          
          # 2. Исправляем URL MLX, так как Apple перенесла часть библиотек в новый репозиторий mlx-swift-lm
          sed -i '' 's|https://github.com/ml-explore/mlx-swift-examples|https://github.com/ml-explore/mlx-swift-lm|g' fullmoon.xcodeproj/project.pbxproj
          
          find . -name "Package.resolved" -delete
          
      - name: Resolve Swift packages
        script: |
          set -e
          xcodebuild -resolvePackageDependencies \
            -project fullmoon.xcodeproj \
            -scheme fullmoon
            
      - name: Build unsigned IPA
        script: |
          set -e # Очень важно! Если xcodebuild упадет, не создаем пустой файл.
          
          # ВАЖНО: Используем archive без CONFIGURATION_BUILD_DIR!
          # Это позволит Xcode корректно собрать Metal-шейдеры внутри своих служебных директорий.
          xcodebuild archive \
            -project fullmoon.xcodeproj \
            -scheme fullmoon \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$CM_BUILD_DIR/fullmoon.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
          
          # Упаковываем результат в IPA
          mkdir -p Payload
          cp -r "$CM_BUILD_DIR/fullmoon.xcarchive/Products/Applications/fullmoon.app" Payload/
          zip -r fullmoon.ipa Payload
          
    artifacts:
      - fullmoon.ipa
